<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Plataforma Financeira SPA</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Chart.js para gráficos dinâmicos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Variáveis de Tema - SaaS Moderno Dark/Glass */
        :root {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --primary: #6366f1; /* Indigo */
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --sidebar-width: 250px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar (Navegação) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 100;
        }

        .logo-area {
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area i {
            color: var(--primary);
            margin-right: 10px;
            font-size: 1.8rem;
        }

        .nav-menu {
            padding: 20px 15px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: var(--transition);
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            font-size: 1.4rem;
            margin-right: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .nav-item.active {
            background-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .user-profile {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-info h4 { font-size: 0.9rem; }
        .user-info p { font-size: 0.8rem; color: var(--text-muted); }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Superior */
        .top-header {
            height: 80px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }

        .search-bar {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            width: 300px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            margin-left: 10px;
            width: 100%;
        }

        .header-actions {
            display: flex;
            gap: 20px;
        }

        .icon-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover { background: var(--bg-surface-hover); }

        /* Área de Visão Dinâmica (SPA) */
        .view-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            /* Scrollbar personalizada */
            scrollbar-width: thin;
            scrollbar-color: var(--bg-surface-hover) transparent;
        }

        .view-container::-webkit-scrollbar { width: 6px; }
        .view-container::-webkit-scrollbar-thumb { background-color: var(--bg-surface-hover); border-radius: 10px; }

        /* --- Componentes das Visões --- */
        .page-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Cards do Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--bg-surface);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-trend.positive { color: var(--success); }
        .stat-trend.negative { color: var(--danger); }

        /* Layout Gráfico e Tabela */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 24px;
        }

        .card-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        /* Tabela de Transações */
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            text-align: left;
            padding: 12px 15px;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
        }

        .table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-completed { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        /* Animação de Transição de Visões */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loader para simular requisições de API */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsividade */
        @media (max-width: 1024px) {
            .content-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: absolute; height: 100vh; }
            .sidebar.open { transform: translateX(0); }
            .top-header { padding: 0 20px; }
            .view-container { padding: 20px; }
            .search-bar { display: none; } /* Esconde na versão mobile para simplificar */
            .mobile-menu-btn { display: flex !important; }
        }
        .mobile-menu-btn {
            display: none;
            background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Menu Lateral (Sidebar) -->
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <i class='bx bx-hive'></i> Nexus
        </div>
        <nav class="nav-menu">
            <!-- Os atributos data-view controlam o roteamento da SPA -->
            <a class="nav-item active" data-view="dashboard">
                <i class='bx bx-grid-alt'></i> Visão Geral
            </a>
            <a class="nav-item" data-view="transactions">
                <i class='bx bx-transfer-alt'></i> Transações
            </a>
            <a class="nav-item" data-view="analytics">
                <i class='bx bx-pie-chart-alt-2'></i> Análises
            </a>
            <a class="nav-item" data-view="settings">
                <i class='bx bx-cog'></i> Configurações
            </a>
        </nav>
        <div class="user-profile">
            <div class="user-avatar">JP</div>
            <div class="user-info">
                <h4>João Pedro</h4>
                <p>Plano Enterprise</p>
            </div>
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="main-content">
        <!-- Header Fixo -->
        <header class="top-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class='bx bx-menu'></i></button>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Pesquisar faturas, clientes...">
            </div>
            <div class="header-actions">
                <button class="icon-btn"><i class='bx bx-bell'></i></button>
                <button class="icon-btn" style="background: var(--primary); border-color: var(--primary);"><i class='bx bx-plus'></i></button>
            </div>
        </header>

        <!-- Container onde as "páginas" serão injetadas dinamicamente -->
        <div class="view-container" id="app-view">
            <!-- Conteúdo carregado via JS -->
        </div>
    </main>

    <!-- Lógica da Single Page Application (SPA) -->
    <script>
        // --- 1. Estado da Aplicação e Dados Simulados (Como se viesse de uma API) ---
        const appState = {
            balance: "€ 124.500,00",
            income: "+ € 14.200,50",
            expenses: "- € 3.450,00",
            transactions: [
                { id: "#TRX-001", client: "TechCorp Lda", date: "Hoje, 14:30", amount: "€ 4.500,00", status: "completed" },
                { id: "#TRX-002", client: "Stripe Pagamentos", date: "Hoje, 10:15", amount: "€ 1.250,00", status: "completed" },
                { id: "#TRX-003", client: "Amazon Web Services", date: "Ontem", amount: "- € 850,00", status: "pending" },
                { id: "#TRX-004", client: "Global Industries", date: "12 Mar, 2026", amount: "€ 12.000,00", status: "completed" }
            ]
        };

        // Instância do gráfico (para podermos destruí-la ao trocar de página)
        let dashboardChart = null;

        // --- 2. Componentes (Views) da SPA ---

        // View: Dashboard
        const DashboardView = () => `
            <div class="fade-in">
                <h2 class="page-title">Visão Geral do Negócio</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <span>Saldo Disponível</span>
                            <div class="stat-icon"><i class='bx bx-wallet'></i></div>
                        </div>
                        <div class="stat-value">${appState.balance}</div>
                        <div class="stat-trend positive"><i class='bx bx-up-arrow-alt'></i> +12.5% este mês</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span>Receitas (30 dias)</span>
                            <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);"><i class='bx bx-trending-up'></i></div>
                        </div>
                        <div class="stat-value">${appState.income}</div>
                        <div class="stat-trend positive"><i class='bx bx-up-arrow-alt'></i> +4.2% em relação a ontem</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <span>Despesas</span>
                            <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);"><i class='bx bx-trending-down'></i></div>
                        </div>
                        <div class="stat-value">${appState.expenses}</div>
                        <div class="stat-trend negative"><i class='bx bx-down-arrow-alt'></i> -1.5% da meta</div>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="card">
                        <div class="card-title">Fluxo de Caixa Mensal</div>
                        <canvas id="cashflowChart" height="100"></canvas>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">
                            Transações Recentes
                            <a href="#" style="font-size: 0.8rem; color: var(--primary);">Ver todas</a>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            ${appState.transactions.slice(0, 3).map(tx => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);">
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <div style="width: 35px; height: 35px; border-radius: 8px; background: var(--bg-surface-hover); display: flex; align-items: center; justify-content: center;">
                                            <i class='bx ${tx.amount.includes('-') ? 'bx-up-arrow-circle text-danger' : 'bx-down-arrow-circle text-success'}' style="color: ${tx.amount.includes('-') ? 'var(--danger)' : 'var(--success)'}"></i>
                                        </div>
                                        <div>
                                            <div style="font-weight: 600; font-size: 0.9rem;">${tx.client}</div>
                                            <div style="font-size: 0.75rem; color: var(--text-muted);">${tx.date}</div>
                                        </div>
                                    </div>
                                    <div style="font-weight: 600; ${tx.amount.includes('-') ? '' : 'color: var(--success);'}">${tx.amount}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
        `;

        // View: Transações (Página Inteira de Tabela)
        const TransactionsView = () => `
            <div class="fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 class="page-title" style="margin-bottom: 0;">Histórico de Transações</h2>
                    <button class="icon-btn" style="width: auto; padding: 0 15px; font-size: 0.9rem;"><i class='bx bx-export' style="margin-right: 5px;"></i> Exportar CSV</button>
                </div>

                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID Transação</th>
                                <th>Cliente / Entidade</th>
                                <th>Data</th>
                                <th>Status</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${appState.transactions.map(tx => `
                                <tr>
                                    <td style="color: var(--primary); font-family: monospace;">${tx.id}</td>
                                    <td style="font-weight: 500;">${tx.client}</td>
                                    <td>${tx.date}</td>
                                    <td><span class="status-badge status-${tx.status}">${tx.status === 'completed' ? 'Concluído' : 'Pendente'}</span></td>
                                    <td style="font-weight: 600;">${tx.amount}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;

        // View: Placeholder para páginas em construção
        const PlaceholderView = (title) => `
            <div class="fade-in" style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <i class='bx bx-server' style="font-size: 5rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                <h2 style="font-size: 1.5rem; margin-bottom: 10px;">Módulo de ${title}</h2>
                <p style="color: var(--text-muted); max-width: 400px;">Esta é uma demonstração da arquitetura SPA. Num projeto real, conectaríamos esta vista a uma API REST ou GraphQL para carregar os dados em tempo real.</p>
            </div>
        `;

        // --- 3. Motor de Roteamento (Router) ---
        const appContainer = document.getElementById('app-view');

        // Função para inicializar o gráfico do Chart.js
        function initChart() {
            const ctx = document.getElementById('cashflowChart');
            if(!ctx) return;
            
            if (dashboardChart) dashboardChart.destroy(); // Limpa gráfico anterior
            
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

            dashboardChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul'],
                    datasets: [{
                        label: 'Receitas',
                        data: [65, 59, 80, 81, 56, 120, 140],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });
        }

        // Função principal de navegação (Renderiza as páginas sem recarregar o navegador)
        function navigateTo(viewName) {
            // Simula um tempo de carregamento de rede (500ms)
            appContainer.innerHTML = `<div class="loader-container"><div class="loader"></div></div>`;
            
            setTimeout(() => {
                switch(viewName) {
                    case 'dashboard':
                        appContainer.innerHTML = DashboardView();
                        initChart(); // O gráfico só é desenhado se a canvas existir
                        break;
                    case 'transactions':
                        appContainer.innerHTML = TransactionsView();
                        break;
                    case 'analytics':
                        appContainer.innerHTML = PlaceholderView('Análises Avançadas');
                        break;
                    case 'settings':
                        appContainer.innerHTML = PlaceholderView('Configurações do Sistema');
                        break;
                    default:
                        appContainer.innerHTML = DashboardView();
                }
            }, 300); // 300ms de "falso delay" para o cliente sentir que os dados foram processados
        }

        // --- 4. Event Listeners ---
        
        // Controla os cliques no menu lateral
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                // Remove classe active de todos
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                // Adiciona no clicado
                e.currentTarget.classList.add('active');
                
                // Pega a view alvo e navega
                const targetView = e.currentTarget.getAttribute('data-view');
                navigateTo(targetView);

                // No mobile, fecha o menu ao clicar
                if(window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            });
        });

        // Menu Mobile Toggle
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Inicia a aplicação na rota Dashboard
        window.onload = () => {
            navigateTo('dashboard');
        };

    </script>
</body>
</html>
